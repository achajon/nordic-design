<style>
  @font-face{
    font-family:"Lost in South";
    src:url("fonts/lost_in_south/Lost in South.otf") format("opentype");
    font-weight:400; font-style:normal; font-display:swap;
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("fonts/Fira Sans Condensed/FiraSansCondensed-Regular.ttf") format("truetype");
    font-weight:400; font-style:normal; font-display:swap;
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("fonts/Fira Sans Condensed/FiraSansCondensed-SemiBold.ttf") format("truetype");
    font-weight:600; font-style:normal; font-display:swap;
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("fonts/Fira Sans Condensed/FiraSansCondensed-Bold.ttf") format("truetype");
    font-weight:700; font-style:normal; font-display:swap;
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("fonts/Fira Sans Condensed/FiraSansCondensed-ExtraBold.ttf") format("truetype");
    font-weight:800; font-style:normal; font-display:swap;
  }

  :root{
    --ink:#101010;
    --charcoal:#1A1A1A;
    --gold:#FFD200;
    --gold-deep:#C9A400;
    --bone:#F7F4EC;
    --bone-dim: rgba(247,244,236,.6);
    --sp-1:8px; --sp-2:16px; --sp-3:24px; --sp-4:40px; --sp-5:64px; --sp-6:96px;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--ink);color:var(--bone);}
  body{
    font-family:"Fira Sans Condensed",Helvetica,Arial,sans-serif;
    min-height:100vh;
  }

  .site-header{
    display:flex;
    align-items:center;
    gap:var(--sp-3);
    padding:var(--sp-4) var(--sp-3);
    border-bottom:1px solid rgba(247,244,236,.1);
  }
  .site-header .logo{
    width:48px;
    height:48px;
    object-fit:contain;
    flex-shrink:0;
  }
  .site-header h1{
    font-family:"Lost in South",sans-serif;
    text-transform:uppercase;
    font-size:clamp(22px,4vw,32px);
    line-height:1.05;
    margin:0;
    letter-spacing:.01em;
  }
  .site-header .eyebrow{
    margin:var(--sp-1) 0 0;
    font-size:11px;
    font-weight:700;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--bone-dim);
  }

  main{
    padding:var(--sp-5) var(--sp-3) var(--sp-6);
    max-width:1200px;
    margin:0 auto;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:var(--sp-1);
  }
  @media (max-width:720px){
    .grid{grid-template-columns:repeat(2,1fr);}
  }
  @media (max-width:420px){
    .grid{grid-template-columns:1fr;}
  }

  .tile{
    position:relative;
    display:flex;
    flex-direction:column;
    background:var(--charcoal);
    border:none;
    padding:0;
    margin:0;
    color:inherit;
    text-align:left;
    text-decoration:none;
    cursor:pointer;
    font-family:inherit;
    overflow:hidden;
  }
  .tile:focus-visible{
    outline:2px solid var(--gold);
    outline-offset:2px;
  }
  .tile img{
    width:100%;
    aspect-ratio:4/5;
    object-fit:cover;
    display:block;
  }
  .tile .badge{
    position:absolute;
    top:var(--sp-1);
    right:var(--sp-1);
    width:22px;
    height:22px;
    border-radius:50%;
    background:rgba(16,16,16,.55);
    display:flex;
    align-items:center;
    justify-content:center;
    backdrop-filter:blur(2px);
  }
  .tile .badge svg{width:12px;height:12px;fill:var(--gold);}
  .tile-caption{
    padding:var(--sp-1) var(--sp-1) 2px;
    font-size:11px;
    font-weight:600;
    letter-spacing:.02em;
    color:var(--bone-dim);
    line-height:1.3;
  }
  .tile-date{
    padding:0 var(--sp-1) var(--sp-2);
    font-size:10px;
    font-weight:600;
    letter-spacing:.04em;
    text-transform:uppercase;
    color:var(--gold-deep);
  }
  .modal-date{
    display:block;
    margin:0;
    font-size:11px;
    font-weight:700;
    letter-spacing:.06em;
    text-transform:uppercase;
    color:var(--gold-deep);
  }

  .modal{
    display:none;
    position:fixed;
    inset:0;
    z-index:100;
    align-items:center;
    justify-content:center;
    padding:var(--sp-3);
  }
  .modal.open{display:flex;}
  .modal-backdrop{
    position:absolute;
    inset:0;
    background:rgba(16,16,16,.85);
  }
  .modal-panel{
    position:relative;
    z-index:1;
    background:var(--charcoal);
    border-radius:10px;
    max-width:960px;
    width:100%;
    max-height:90vh;
    overflow:auto;
    display:flex;
    flex-direction:column;
  }
  @media (min-width:760px){
    .modal-panel{flex-direction:row;}
  }
  .modal-close{
    position:absolute;
    top:var(--sp-2);
    right:var(--sp-2);
    z-index:2;
    width:36px;
    height:36px;
    border-radius:50%;
    border:none;
    background:rgba(16,16,16,.6);
    color:var(--bone);
    font-size:20px;
    line-height:1;
    cursor:pointer;
  }
  .modal-close:focus-visible{outline:2px solid var(--gold);}

  #modalBody{
    display:flex;
    flex-direction:column;
    width:100%;
  }
  @media (min-width:760px){
    #modalBody{flex-direction:row;}
  }
  .modal-media{
    flex:1 1 55%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#000;
    min-width:0;
  }
  .modal-media img,
  .modal-media video{
    width:100%;
    max-height:85vh;
    object-fit:contain;
    display:block;
  }
  .modal-media-video{padding:var(--sp-2);}

  .modal-copy{
    flex:1 1 45%;
    padding:var(--sp-4) var(--sp-3);
    display:flex;
    flex-direction:column;
    gap:var(--sp-2);
    min-width:0;
  }
  .modal-title{
    padding:var(--sp-2) var(--sp-3) var(--sp-3);
    font-weight:600;
    color:var(--bone-dim);
  }
  .modal-label{
    margin:0;
    font-size:11px;
    font-weight:700;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--gold);
  }
  .pill{
    display:inline-block;
    align-self:flex-start;
    background:var(--gold);
    color:var(--ink);
    font-size:11px;
    font-weight:700;
    letter-spacing:.06em;
    text-transform:uppercase;
    padding:4px 12px;
    border-radius:12px;
  }
  .modal-headline{
    font-family:"Lost in South",sans-serif;
    text-transform:uppercase;
    font-size:clamp(22px,3vw,30px);
    line-height:1.02;
    color:var(--bone);
  }
  .modal-headline .hl{color:var(--gold);}
  .modal-caption{
    margin:0;
    font-size:15px;
    line-height:1.6;
    color:var(--bone-dim);
  }
  .modal-ig-label{
    margin-top:var(--sp-1);
    padding-top:var(--sp-2);
    border-top:1px dashed rgba(247,244,236,.2);
  }
  .modal-ig-caption{
    margin:0;
    font-size:14px;
    line-height:1.6;
    color:var(--bone);
    white-space:pre-wrap;
  }
  .modal-btn-row{
    display:flex;
    flex-wrap:wrap;
    gap:var(--sp-2);
    margin-top:var(--sp-1);
  }
  .modal-btn{
    background:var(--gold);
    color:var(--ink);
    border:none;
    border-radius:6px;
    font-family:inherit;
    font-size:12px;
    font-weight:700;
    letter-spacing:.03em;
    text-transform:uppercase;
    text-decoration:none;
    padding:10px 18px;
    cursor:pointer;
  }
  .modal-btn:focus-visible{outline:2px solid var(--bone);}
  .modal-loading{color:var(--bone-dim);padding:var(--sp-4) var(--sp-3);}

  .services-table{
    width:100%;
    border-collapse:collapse;
    margin-top:var(--sp-1);
  }
  .services-table tr{
    border-top:1px dashed rgba(247,244,236,.2);
  }
  .services-table tr:first-child{border-top:none;}
  .services-table td{
    padding:8px 0;
    font-size:14px;
  }
  .services-table td.price{
    text-align:right;
    font-family:"Fira Sans Condensed",sans-serif;
    font-weight:800;
    color:var(--gold);
  }

  .site-footer{
    text-align:center;
    padding:0 var(--sp-3) var(--sp-5);
    font-size:11px;
    color:var(--bone-dim);
  }

  .copy-menu{
    display:none;
    position:fixed;
    z-index:200;
    width:min(340px, 90vw);
    max-height:60vh;
    background:var(--charcoal);
    border:1px solid rgba(247,244,236,.15);
    border-radius:8px;
    box-shadow:0 8px 24px rgba(0,0,0,.5);
    padding:var(--sp-2);
    flex-direction:column;
    gap:var(--sp-1);
  }
  .copy-menu.open{display:flex;}
  .copy-menu-label{
    margin:0;
    font-size:10px;
    font-weight:700;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--gold);
  }
  .copy-menu-text{
    margin:0;
    font-size:13px;
    line-height:1.5;
    color:var(--bone);
    white-space:pre-wrap;
    overflow-y:auto;
    max-height:32vh;
  }
  .copy-menu-btn{
    align-self:flex-start;
    background:var(--gold);
    color:var(--ink);
    border:none;
    border-radius:6px;
    font-size:12px;
    font-weight:700;
    letter-spacing:.03em;
    text-transform:uppercase;
    padding:8px 14px;
    cursor:pointer;
  }
  .copy-menu-btn:focus-visible{outline:2px solid var(--bone);}

const POSTS_SORTED = POSTS.slice().sort((a, b) => new Date(b.date) - new Date(a.date));

const MONTHS_ES = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
function formatDateEs(dateStr){
  if(!dateStr) return '';
  const [y, m, d] = dateStr.split('-').map(Number);
  return `${d} ${MONTHS_ES[m - 1]} ${y}`;
}

const grid = document.getElementById('grid');
const modal = document.getElementById('modal');
const modalBody = document.getElementById('modalBody');
const modalClose = document.getElementById('modalClose');
const copyMenu = document.getElementById('copyMenu');
const copyCache = new Map();

function renderGrid(){
  POSTS_SORTED.forEach((post, i) => {
    const isCarousel = post.type === 'carousel';
    const tile = document.createElement(isCarousel ? 'a' : 'button');
    tile.className = 'tile';
    if(isCarousel){
      tile.href = post.previewHref;
      tile.target = '_blank';
      tile.rel = 'noopener';
    } else {
      tile.type = 'button';
      tile.addEventListener('click', () => openModal(i));
    }
    tile.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      openCopyMenu(post, e.clientX, e.clientY);
    });

    const img = document.createElement('img');
    img.src = post.cover;
    img.alt = post.alt;
    img.loading = 'lazy';
    tile.appendChild(img);

    if(post.type === 'carousel' || post.type === 'video'){
      const badge = document.createElement('span');
      badge.className = 'badge';
      badge.innerHTML = post.type === 'carousel' ? CAROUSEL_SVG : PLAY_SVG;
      tile.appendChild(badge);
    }

    const caption = document.createElement('span');
    caption.className = 'tile-caption';
    caption.textContent = post.label ? `${post.title} — ${post.label.replace('Versión: ','')}` : post.title;
    tile.appendChild(caption);

    const dateEl = document.createElement('span');
    dateEl.className = 'tile-date';
    dateEl.textContent = formatDateEs(post.date);
    tile.appendChild(dateEl);

    grid.appendChild(tile);
  });
}

function openModal(index){
  const post = POSTS_SORTED[index];
  modalBody.innerHTML = '';
  if(post.type === 'video'){
    renderVideoModal(post);
  } else if(post.type === 'single'){
    renderSingleModal(post);
  }
  modal.classList.add('open');
  modal.setAttribute('aria-hidden','false');
  modalClose.focus();
}

function closeModal(){
  modal.classList.remove('open');
  modal.setAttribute('aria-hidden','true');
  modalBody.innerHTML = '';
}

function renderVideoModal(post){
  const media = document.createElement('div');
  media.className = 'modal-media modal-media-video';
  const video = document.createElement('video');
  video.controls = true;
  video.preload = 'none';
  video.src = post.videoSrc;
  media.appendChild(video);

  const title = document.createElement('p');
  title.className = 'modal-title';
  title.textContent = post.title;
  if(post.date){
    const dateEl = document.createElement('span');
    dateEl.className = 'modal-date';
    dateEl.textContent = `Generado: ${formatDateEs(post.date)}`;
    title.appendChild(dateEl);
  }

  modalBody.appendChild(media);
  modalBody.appendChild(title);
}

async function fetchCopy(path){
  if(copyCache.has(path)) return copyCache.get(path);
  const res = await fetch(path);
  const json = await res.json();
  copyCache.set(path, json);
  return json;
}

function resolveCopy(json, file){
  const entry = Array.isArray(json.versions) ? json.versions.find(v => v.file === file) : null;
  const pick = (key) => (entry && entry[key] !== undefined) ? entry[key] : json[key];
  return {
    pill: pick('pill'),
    headline: pick('headline'),
    highlight: pick('headline_highlight'),
    caption: pick('caption'),
    services: json.services || null
  };
}

function buildHeadlineNode(headline, highlight){
  const span = document.createElement('span');
  span.className = 'modal-headline';
  if(!headline) return span;
  if(!highlight || !headline.includes(highlight)){
    span.textContent = headline;
    return span;
  }
  const idx = headline.indexOf(highlight);
  span.appendChild(document.createTextNode(headline.slice(0, idx)));
  const hl = document.createElement('span');
  hl.className = 'hl';
  hl.textContent = highlight;
  span.appendChild(hl);
  span.appendChild(document.createTextNode(headline.slice(idx + highlight.length)));
  return span;
}

async function renderSingleModal(post){
  modalBody.innerHTML = '<p class="modal-loading">Cargando copy…</p>';

  let json = null;
  try{
    json = await fetchCopy(post.copyJson);
  } catch(err){
    json = null;
  }

  modalBody.innerHTML = '';

  const media = document.createElement('div');
  media.className = 'modal-media';
  const img = document.createElement('img');
  img.src = post.cover;
  img.alt = post.alt;
  media.appendChild(img);

  const copyWrap = document.createElement('div');
  copyWrap.className = 'modal-copy';

  if(post.date){
    const dateEl = document.createElement('p');
    dateEl.className = 'modal-date';
    dateEl.textContent = `Generado: ${formatDateEs(post.date)}`;
    copyWrap.appendChild(dateEl);
  }

  if(post.label){
    const labelEl = document.createElement('p');
    labelEl.className = 'modal-label';
    labelEl.textContent = post.label;
    copyWrap.appendChild(labelEl);
  }

  if(json){
    const copy = resolveCopy(json, post.file);

    if(copy.pill){
      const pill = document.createElement('span');
      pill.className = 'pill';
      pill.textContent = copy.pill;
      copyWrap.appendChild(pill);
    }
    if(copy.headline){
      copyWrap.appendChild(buildHeadlineNode(copy.headline, copy.highlight));
    }
    if(copy.caption){
      const cap = document.createElement('p');
      cap.className = 'modal-caption';
      cap.textContent = copy.caption;
      copyWrap.appendChild(cap);
    }
    if(copy.services && copy.services.length){
      const table = document.createElement('table');
      table.className = 'services-table';
      copy.services.forEach(([name, price]) => {
        const row = document.createElement('tr');
        const nameCell = document.createElement('td');
        nameCell.textContent = name;
        const priceCell = document.createElement('td');
        priceCell.className = 'price';
        priceCell.textContent = price;
        row.appendChild(nameCell);
        row.appendChild(priceCell);
        table.appendChild(row);
      });
      copyWrap.appendChild(table);
    }

    const igCaption = resolveInstagramCaption(json, post.file);
    if(igCaption){
      const igLabel = document.createElement('p');
      igLabel.className = 'modal-label modal-ig-label';
      igLabel.textContent = 'Copy para publicar';
      copyWrap.appendChild(igLabel);

      const igCaptionEl = document.createElement('p');
      igCaptionEl.className = 'modal-ig-caption';
      igCaptionEl.textContent = igCaption;
      copyWrap.appendChild(igCaptionEl);
    }

    const btnRow = document.createElement('div');
    btnRow.className = 'modal-btn-row';

    if(igCaption){
      const copyBtn = document.createElement('button');
      copyBtn.type = 'button';
      copyBtn.className = 'modal-btn';
      copyBtn.textContent = 'Copiar';
      copyBtn.addEventListener('click', async () => {
        try{
          await navigator.clipboard.writeText(igCaption);
          copyBtn.textContent = '¡Copiado!';
          setTimeout(() => { copyBtn.textContent = 'Copiar'; }, 1500);
        } catch(err){
          copyBtn.textContent = 'Error al copiar';
        }
      });
      btnRow.appendChild(copyBtn);
    }

    const downloadBtn = document.createElement('a');
    downloadBtn.className = 'modal-btn';
    downloadBtn.href = post.cover;
    downloadBtn.download = `${post.id}.${post.cover.split('.').pop()}`;
    downloadBtn.textContent = 'Descargar imagen';
    btnRow.appendChild(downloadBtn);

    copyWrap.appendChild(btnRow);
  } else {
    const err = document.createElement('p');
    err.className = 'modal-caption';
    err.textContent = 'No se pudo cargar el copy (¿estás sirviendo la página con un servidor local?).';
    copyWrap.appendChild(err);

    const btnRow = document.createElement('div');
    btnRow.className = 'modal-btn-row';
    const downloadBtn = document.createElement('a');
    downloadBtn.className = 'modal-btn';
    downloadBtn.href = post.cover;
    downloadBtn.download = `${post.id}.${post.cover.split('.').pop()}`;
    downloadBtn.textContent = 'Descargar imagen';
    btnRow.appendChild(downloadBtn);
    copyWrap.appendChild(btnRow);
  }

  modalBody.appendChild(media);
  modalBody.appendChild(copyWrap);
}

function resolveInstagramCaption(json, file){
  const entry = Array.isArray(json.versions) ? json.versions.find(v => v.file === file) : null;
  const pick = (key) => (entry && entry[key] !== undefined) ? entry[key] : json[key];
  return pick('instagram_caption') || pick('caption_on_image') || pick('caption') || null;
}

async function getPostCopyText(post){
  if(post.type !== 'single' || !post.copyJson){
    return null;
  }
  try{
    const json = await fetchCopy(post.copyJson);
    return resolveInstagramCaption(json, post.file);
  } catch(err){
    return null;
  }
}

const copyMenuText = document.getElementById('copyMenuText');
const copyMenuBtn = document.getElementById('copyMenuBtn');
let copyMenuCurrentText = '';

function closeCopyMenu(){
  copyMenu.classList.remove('open');
  copyMenuCurrentText = '';
}

async function openCopyMenu(post, x, y){
  copyMenuCurrentText = '';
  copyMenuText.textContent = 'Cargando…';
  copyMenuBtn.textContent = 'Copiar';
  copyMenu.classList.add('open');
  positionCopyMenu(x, y);

  const text = await getPostCopyText(post);
  if(text){
    copyMenuCurrentText = text;
    copyMenuText.textContent = text;
  } else {
    copyMenuText.textContent = 'No hay copy disponible para este post.';
  }
  positionCopyMenu(x, y);
}

function positionCopyMenu(x, y){
  const menuWidth = copyMenu.offsetWidth;
  const menuHeight = copyMenu.offsetHeight;
  const left = Math.min(x, window.innerWidth - menuWidth - 12);
  const top = Math.min(y, window.innerHeight - menuHeight - 12);
  copyMenu.style.left = `${Math.max(12, left)}px`;
  copyMenu.style.top = `${Math.max(12, top)}px`;
}

copyMenuBtn.addEventListener('click', async () => {
  if(!copyMenuCurrentText) return;
  try{
    await navigator.clipboard.writeText(copyMenuCurrentText);
    copyMenuBtn.textContent = '¡Copiado!';
    setTimeout(() => { copyMenuBtn.textContent = 'Copiar'; }, 1500);
  } catch(err){
    copyMenuBtn.textContent = 'Error al copiar';
  }
});

document.addEventListener('click', (e) => {
  if(copyMenu.classList.contains('open') && !copyMenu.contains(e.target)){
    closeCopyMenu();
  }
});
document.addEventListener('contextmenu', (e) => {
  if(copyMenu.classList.contains('open') && !e.target.closest('.tile')){
    closeCopyMenu();
  }
});

modalClose.addEventListener('click', closeModal);
modal.querySelector('.modal-backdrop').addEventListener('click', closeModal);
document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape'){
    if(modal.classList.contains('open')) closeModal();
    if(copyMenu.classList.contains('open')) closeCopyMenu();
  }
});

renderGrid();
</script>
