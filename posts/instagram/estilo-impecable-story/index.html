<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>estilo-impecable-story</title>
<style>
  @font-face{
    font-family:"Lost in South";
    src:url("assets/fonts/Lost in South.otf") format("opentype");
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("assets/fonts/FiraSansCondensed-Regular.ttf") format("truetype");
    font-weight:400;
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("assets/fonts/FiraSansCondensed-Bold.ttf") format("truetype");
    font-weight:700;
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("assets/fonts/FiraSansCondensed-ExtraBold.ttf") format("truetype");
    font-weight:800;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1920px;background:#FFD200;overflow:hidden;}
  .canvas{
    position:relative;
    width:1080px;
    height:1920px;
    background:#FFD200;
    overflow:hidden;
  }

  /* ---- top texture band: oversized rotated wordmark text ---- */
  .texture-band{
    position:absolute;
    top:0; left:0;
    width:1080px;
    height:300px;
    overflow:hidden;
  }
  .texture-band .row{
    position:absolute;
    left:-120px;
    white-space:nowrap;
    font-family:"Fira Sans Condensed";
    font-weight:800;
    font-style:italic;
    letter-spacing:.01em;
    color:#101010;
    text-transform:uppercase;
    transform:rotate(-6deg);
  }
  .texture-band .row1{ top:-40px; font-size:150px; }
  .texture-band .row2{ top:120px; font-size:150px; }

  /* ---- photo panel (torn top/bottom) ---- */
  .photo-panel{
    position:absolute;
    top:430px; left:0;
    width:1080px;
    height:930px;
    overflow:hidden;
    clip-path: polygon(0.0% 1.4%, 10.0% 0.9%, 20.0% 0.7%, 30.0% 0.8%, 40.0% 0.5%, 50.0% 0.4%, 60.0% 1.0%, 70.0% 1.3%, 80.0% 1.5%, 90.0% 0.8%, 100.0% 1.8%, 99.2% 0.0%, 99.4% 10.0%, 99.9% 20.0%, 99.2% 30.0%, 98.9% 40.0%, 99.0% 50.0%, 99.9% 60.0%, 99.5% 70.0%, 99.8% 80.0%, 99.1% 90.0%, 99.5% 100.0%, 100.0% 99.5%, 90.0% 99.2%, 80.0% 99.8%, 70.0% 98.8%, 60.0% 99.3%, 50.0% 98.3%, 40.0% 98.8%, 30.0% 98.3%, 20.0% 99.0%, 10.0% 99.4%, 0.0% 99.1%, 0.5% 100.0%, 0.5% 90.0%, 1.0% 80.0%, 1.0% 70.0%, 0.8% 60.0%, 0.9% 50.0%, 0.2% 40.0%, 0.2% 30.0%, 0.3% 20.0%, 1.4% 10.0%, 1.1% 0.0%);
    background:#0a0a0a;
  }
  .photo-panel img{
    position:absolute;
    top:0; left:0;
    width:1080px;
    height:auto;
    transform:translateY(-230px);
  }
  .photo-panel::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(to top, rgba(16,16,16,.85) 0%, rgba(16,16,16,0) 26%);
  }

  /* ---- headline card (torn paper, overlaps top of photo) ---- */
  .headline-card{
    position:absolute;
    top:210px; left:90px;
    width:900px;
    min-height:250px;
    background:#F7F4EC;
    clip-path: polygon(0.0% 0.9%, 12.5% 3.8%, 25.0% 1.0%, 37.5% 4.3%, 50.0% 3.7%, 62.5% 2.3%, 75.0% 3.8%, 87.5% 3.5%, 100.0% 0.3%, 100.0% 0.0%, 99.1% 12.5%, 99.6% 25.0%, 99.6% 37.5%, 98.7% 50.0%, 98.5% 62.5%, 99.4% 75.0%, 98.6% 87.5%, 99.0% 100.0%, 100.0% 94.9%, 87.5% 94.0%, 75.0% 98.8%, 62.5% 98.3%, 50.0% 95.9%, 37.5% 95.3%, 25.0% 98.4%, 12.5% 99.2%, 0.0% 99.8%, 0.6% 100.0%, 0.3% 87.5%, 0.5% 75.0%, 1.2% 62.5%, 0.5% 50.0%, 1.5% 37.5%, 1.3% 25.0%, 0.6% 12.5%, 1.4% 0.0%);
    padding:56px 60px 64px;
    z-index:3;
    box-shadow: 0 18px 34px rgba(0,0,0,.28);
  }
  .headline-card .headline{
    font-family:"Lost in South";
    font-size:96px;
    letter-spacing:.07em;
    line-height:0.98;
    text-transform:uppercase;
    color:#101010;
  }
  .headline-card .headline .hl{
    color:#C9A400;
  }

  /* ---- service chips row (torn paper, overlap bottom of photo) ---- */
  .chip{
    position:absolute;
    top:1230px;
    width:298px;
    height:196px;
    background:#F7F4EC;
    z-index:4;
    box-shadow: 0 14px 24px rgba(0,0,0,.24);
    text-align:center;
    padding:34px 20px 0;
  }
  .chip-1{ left:44px;  clip-path: polygon(0.0% 0.5%, 16.7% 5.0%, 33.3% 3.5%, 50.0% 1.3%, 66.7% 4.6%, 83.3% 3.5%, 100.0% 4.9%, 98.0% 0.0%, 97.0% 16.7%, 98.6% 33.3%, 97.1% 50.0%, 98.3% 66.7%, 97.8% 83.3%, 99.0% 100.0%, 100.0% 99.9%, 83.3% 95.4%, 66.7% 99.0%, 50.0% 97.0%, 33.3% 97.3%, 16.7% 98.4%, 0.0% 96.7%, 0.6% 100.0%, 3.2% 83.3%, 3.0% 66.7%, 2.8% 50.0%, 2.4% 33.3%, 1.0% 16.7%, 0.0% 0.0%); transform:rotate(-2.2deg); }
  .chip-2{ left:391px; top:1252px; clip-path: polygon(0.0% 0.8%, 16.7% 2.5%, 33.3% 5.0%, 50.0% 2.7%, 66.7% 1.4%, 83.3% 3.9%, 100.0% 1.8%, 97.3% 0.0%, 98.6% 16.7%, 98.8% 33.3%, 97.6% 50.0%, 97.3% 66.7%, 99.3% 83.3%, 98.7% 100.0%, 100.0% 96.3%, 83.3% 98.4%, 66.7% 95.3%, 50.0% 98.6%, 33.3% 95.2%, 16.7% 97.2%, 0.0% 96.6%, 1.3% 100.0%, 0.1% 83.3%, 1.4% 66.7%, 1.7% 50.0%, 2.3% 33.3%, 1.0% 16.7%, 2.1% 0.0%); transform:rotate(1.6deg); }
  .chip-3{ left:738px; clip-path: polygon(0.0% 0.3%, 16.7% 5.7%, 33.3% 4.3%, 50.0% 4.9%, 66.7% 5.0%, 83.3% 3.6%, 100.0% 3.9%, 98.1% 0.0%, 98.1% 16.7%, 98.0% 33.3%, 97.7% 50.0%, 97.1% 66.7%, 96.8% 83.3%, 97.1% 100.0%, 100.0% 98.1%, 83.3% 98.5%, 66.7% 96.3%, 50.0% 97.3%, 33.3% 98.9%, 16.7% 94.7%, 0.0% 98.0%, 0.8% 100.0%, 1.4% 83.3%, 1.9% 66.7%, 0.8% 50.0%, 3.1% 33.3%, 1.5% 16.7%, 2.6% 0.0%); transform:rotate(-1.8deg); }

  .chip .icon{
    display:flex;
    justify-content:center;
    margin-bottom:10px;
  }
  .chip .label{
    font-family:"Fira Sans Condensed";
    font-weight:700;
    font-size:29px;
    line-height:1.12;
    letter-spacing:.01em;
    text-transform:uppercase;
    color:#101010;
  }

  /* ---- signature tagline (fills gap above contact bar) ---- */
  .tagline{
    position:absolute;
    left:0; right:0;
    top:1490px;
    text-align:center;
    font-family:"Lost in South";
    font-size:58px;
    letter-spacing:.07em;
    color:#101010;
    opacity:.82;
  }

  /* ---- bottom contact bar ---- */
  .bottom-bar{
    position:absolute;
    left:0; right:0; bottom:0;
    height:296px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:26px;
  }
  .bottom-bar .logo{
    height:78px;
  }
  .bottom-bar .cta{
    display:flex;
    align-items:center;
    gap:16px;
    background:#101010;
    padding:20px 40px;
    border-radius:6px;
  }
  .bottom-bar .cta .phone-icon{
    font-size:34px;
    color:#FFD200;
  }
  .bottom-bar .cta .num{
    font-family:"Fira Sans Condensed";
    font-weight:800;
    font-size:38px;
    letter-spacing:.03em;
    color:#F7F4EC;
  }
  .bottom-bar .sub{
    font-family:"Fira Sans Condensed";
    font-weight:700;
    font-size:20px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:#101010;
    opacity:.75;
  }
</style>
</head>
<body>
  <div class="canvas">

    <div class="texture-band">
      <div class="row row1">NORDIC BARBER SHOP &bull; NORDIC BARBER SHOP &bull;</div>
      <div class="row row2">NORDIC BARBER SHOP &bull; NORDIC BARBER SHOP &bull;</div>
    </div>

    <div class="photo-panel">
      <img src="assets/bg.png">
    </div>

    <div class="headline-card">
      <div class="headline">ESTILO<br>IMPECABLE,<br>CORTE <span class="hl">EXCLUSIVO</span></div>
    </div>

    <div class="chip chip-1">
      <div class="icon">
        <svg viewBox="0 0 64 64" width="52" height="52">
          <g stroke="#101010" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
            <line x1="8" y1="56" x2="38" y2="26"/>
          </g>
          <path d="M38 26 L58 8 L52 4 L32 22 Z" fill="#101010"/>
          <circle cx="10" cy="54" r="4.5" fill="#101010"/>
        </svg>
      </div>
      <div class="label">Corte a<br>navaja</div>
    </div>
    <div class="chip chip-2">
      <div class="icon">
        <svg viewBox="0 0 64 64" width="52" height="52">
          <g stroke="#101010" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
            <circle cx="16" cy="46" r="8"/>
            <circle cx="16" cy="18" r="8"/>
            <line x1="22" y1="24" x2="52" y2="52"/>
            <line x1="22" y1="40" x2="52" y2="12"/>
          </g>
        </svg>
      </div>
      <div class="label">Corte a<br>tijera</div>
    </div>
    <div class="chip chip-3">
      <div class="icon">
        <svg viewBox="0 0 64 64" width="52" height="52">
          <g fill="#101010">
            <rect x="17" y="7" width="30" height="38" rx="7"/>
            <rect x="13" y="43" width="38" height="9" rx="1.5"/>
            <rect x="15" y="52" width="4" height="7"/>
            <rect x="22" y="52" width="4" height="7"/>
            <rect x="29" y="52" width="4" height="7"/>
            <rect x="36" y="52" width="4" height="7"/>
            <rect x="43" y="52" width="4" height="7"/>
          </g>
        </svg>
      </div>
      <div class="label">Corte a<br>m&aacute;quina</div>
    </div>

    <div class="tagline">Cada corte, forjado con precisi&oacute;n.</div>

    <div class="bottom-bar">
      <img class="logo" src="assets/Nordic-BarberShop-logo-black.png">
      <div class="cta">
        <span class="phone-icon">&#128222;</span>
        <span class="num">2260-9101</span>
      </div>
      <div class="sub">Agenda tu cita por WhatsApp</div>
    </div>

  </div>
</body>
</html>
