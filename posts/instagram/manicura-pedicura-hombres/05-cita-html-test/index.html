<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>05-cita — HTML build test</title>
<style>
  @font-face{
    font-family:"Lost in South";
    src:url("assets/fonts/Lost in South.otf") format("opentype");
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("assets/fonts/FiraSansCondensed-Regular.ttf") format("truetype");
    font-weight:400;
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("assets/fonts/FiraSansCondensed-Bold.ttf") format("truetype");
    font-weight:700;
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("assets/fonts/FiraSansCondensed-ExtraBold.ttf") format("truetype");
    font-weight:800;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1350px;background:#101010;overflow:hidden;}
  .canvas{
    position:relative;
    width:1080px;
    height:1350px;
    background:#101010;
  }
  .bg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center 20%;
  }
  .scrim{
    position:absolute;
    left:0; right:0; bottom:0;
    height:64%;
    background:linear-gradient(to bottom, rgba(16,16,16,0) 0%, rgba(16,16,16,.55) 35%, rgba(16,16,16,.92) 72%, rgba(16,16,16,1) 100%);
  }
  .pill{
    position:absolute;
    top:64px; left:64px;
    background:#FFD200;
    color:#101010;
    font-family:"Fira Sans Condensed";
    font-weight:800;
    font-size:26px;
    letter-spacing:.06em;
    text-transform:uppercase;
    padding:14px 32px;
    border-radius:40px;
  }
  .headline{
    position:absolute;
    left:64px; right:64px;
    bottom:330px;
    font-family:"Lost in South";
    font-size:96px;
    line-height:0.96;
    text-transform:uppercase;
    color:#F7F4EC;
  }
  .headline .hl{color:#FFD200;}
  .caption{
    position:absolute;
    left:64px; right:64px;
    bottom:250px;
    font-family:"Fira Sans Condensed";
    font-weight:400;
    font-size:32px;
    line-height:1.4;
    color:#F7F4EC;
    opacity:.82;
  }
  .price-bar{
    position:absolute;
    left:64px; right:64px;
    bottom:150px;
    background:#FFD200;
    color:#101010;
    font-family:"Fira Sans Condensed";
    font-weight:800;
    font-size:27px;
    letter-spacing:.02em;
    text-transform:uppercase;
    text-align:center;
    padding:20px 10px;
    border-radius:40px;
    white-space:nowrap;
  }
  .logo{
    position:absolute;
    right:64px;
    bottom:56px;
    height:74px;
  }
</style>
</head>
<body>
  <div class="canvas">
    <img class="bg" src="assets/bg.png">
    <div class="scrim"></div>
    <div class="pill">Agenda tu cita</div>
    <div class="headline">Manos y pies, a <span class="hl">punto</span></div>
    <div class="caption">Reserva tu cita en Nordic Barber Shop.</div>
    <div class="price-bar">Manicura spa Q125 &nbsp;-&nbsp; Pedicura spa Q175 &nbsp;-&nbsp; Con masaje incluido</div>
    <img class="logo" src="assets/Nordic-BarberShop-logo-white.svg">
  </div>
</body>
</html>
