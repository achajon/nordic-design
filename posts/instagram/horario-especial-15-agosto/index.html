<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>horario-especial-15-agosto</title>
<style>
  @font-face{
    font-family:"Lost in South";
    src:url("assets/fonts/Lost in South.otf") format("opentype");
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("assets/fonts/FiraSansCondensed-Regular.ttf") format("truetype");
    font-weight:400;
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("assets/fonts/FiraSansCondensed-Bold.ttf") format("truetype");
    font-weight:700;
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("assets/fonts/FiraSansCondensed-ExtraBold.ttf") format("truetype");
    font-weight:800;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1350px;background:#101010;overflow:hidden;}
  .canvas{
    position:relative;
    width:1080px;
    height:1350px;
    background:#101010;
    overflow:hidden;
  }
  .bg-wrap{
    position:absolute;
    top:0; left:0;
    width:1080px;
    height:810px;
    overflow:hidden;
  }
  .bg-wrap img{
    position:absolute;
    top:0; left:0;
    width:1080px;
    height:auto;
  }
  .scrim{
    position:absolute;
    left:0; right:0;
    top:520px;
    height:290px;
    background:linear-gradient(to bottom, rgba(16,16,16,0) 0%, rgba(16,16,16,.92) 78%, #101010 100%);
  }
  .pill{
    position:absolute;
    top:64px; left:64px;
    background:#FFD200;
    color:#101010;
    font-family:"Fira Sans Condensed";
    font-weight:800;
    font-size:26px;
    letter-spacing:.06em;
    text-transform:uppercase;
    padding:14px 32px;
    border-radius:40px;
  }
  .headline{
    position:absolute;
    left:64px; right:64px;
    top:870px;
    font-family:"Lost in South";
    font-size:88px;
    letter-spacing:.06em;
    line-height:1.04;
    text-transform:uppercase;
    color:#F7F4EC;
  }
  .headline .hl{ color:#FFD200; }
  .caption{
    position:absolute;
    left:64px; right:64px;
    top:1145px;
    font-family:"Fira Sans Condensed";
    font-weight:400;
    font-size:32px;
    line-height:1.4;
    color:#F7F4EC;
    opacity:.85;
  }
  .flag{
    position:absolute;
    left:64px;
    top:1235px;
    font-family:"Fira Sans Condensed";
    font-weight:700;
    font-size:26px;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:#FFD200;
    opacity:.9;
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="bg-wrap"><img src="assets/bg.png"></div>
    <div class="scrim"></div>
    <div class="pill">Horario especial</div>
    <div class="headline">15 de agosto:<br>cerramos a las <span class="hl">5 PM</span></div>
    <div class="caption">D&iacute;a de la Virgen de la Asunci&oacute;n &mdash; agenda tu cita con tiempo</div>
    <div class="flag">Nordic Barber Shop &bull; Guatemala</div>
  </div>
</body>
</html>
