<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>bebida-cortesia — opcion marcas reales (PENDIENTE PERMISO)</title>
<style>
  @font-face{
    font-family:"Lost in South";
    src:url("assets/fonts/Lost in South.otf") format("opentype");
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("assets/fonts/FiraSansCondensed-Regular.ttf") format("truetype");
    font-weight:400;
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("assets/fonts/FiraSansCondensed-Bold.ttf") format("truetype");
    font-weight:700;
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("assets/fonts/FiraSansCondensed-ExtraBold.ttf") format("truetype");
    font-weight:800;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1350px;background:#101010;overflow:hidden;}
  .canvas{
    position:relative;
    width:1080px;
    height:1350px;
    background:#101010;
  }
  .bg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:50% 15%;
  }
  .scrim{
    position:absolute;
    left:0; right:0; top:0;
    height:56%;
    background:linear-gradient(to bottom, rgba(16,16,16,.92) 0%, rgba(16,16,16,.75) 55%, rgba(16,16,16,0) 100%);
  }
  .pill{
    position:absolute;
    top:64px; left:64px;
    background:#FFD200;
    color:#101010;
    font-family:"Fira Sans Condensed";
    font-weight:800;
    font-size:26px;
    letter-spacing:.06em;
    text-transform:uppercase;
    padding:14px 32px;
    border-radius:40px;
    white-space:nowrap;
  }
  .headline{
    position:absolute;
    left:64px; right:64px;
    top:170px;
    font-family:"Lost in South";
    font-size:88px;
    letter-spacing:.06em;
    line-height:0.98;
    text-transform:uppercase;
    color:#F7F4EC;
  }
  .headline .hl{color:#FFD200;}
  .caption{
    position:absolute;
    left:64px; right:64px;
    top:450px;
    font-family:"Fira Sans Condensed";
    font-weight:400;
    font-size:31px;
    line-height:1.4;
    color:#F7F4EC;
    opacity:.85;
  }
  .logo{
    position:absolute;
    right:64px;
    bottom:56px;
    height:83px;
  }
</style>
</head>
<body>
  <div class="canvas">
    <img class="bg" src="assets/bg.png">
    <div class="scrim"></div>
    <div class="pill">Cortes&iacute;a de la casa</div>
    <div class="headline">Cada corte va con tu <span class="hl">bebida</span></div>
    <div class="caption">Gaseosa o cerveza Gallo &mdash; vos eleg&iacute;s, nosotros invitamos.</div>
    <img class="logo" src="assets/Nordic-BarberShop-logo-white.svg">
  </div>
</body>
</html>
