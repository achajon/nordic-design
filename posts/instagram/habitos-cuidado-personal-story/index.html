  <head>

    <title>Nordic Barber Shop — 5 Habitos (Story)</title>

    <style>
      @font-face {
        font-family: "Lost in South";
        src: url("assets/fonts/Lost in South.otf") format("opentype");
        font-weight: 400;
        font-display: block;
      }
      @font-face {
        font-family: "Fira Sans Condensed";
        src: url("assets/fonts/Fira Sans Condensed/FiraSansCondensed-Regular.ttf") format("truetype");
        font-weight: 400;
        font-display: block;
      }
      @font-face {
        font-family: "Fira Sans Condensed";
        src: url("assets/fonts/Fira Sans Condensed/FiraSansCondensed-SemiBold.ttf") format("truetype");
        font-weight: 600;
        font-display: block;
      }
      @font-face {
        font-family: "Fira Sans Condensed";
        src: url("assets/fonts/Fira Sans Condensed/FiraSansCondensed-Bold.ttf") format("truetype");
        font-weight: 700;
        font-display: block;
      }
      @font-face {
        font-family: "Fira Sans Condensed";
        src: url("assets/fonts/Fira Sans Condensed/FiraSansCondensed-ExtraBold.ttf") format("truetype");
        font-weight: 800;
        font-display: block;
      }

      :root {
        --ink: #101010;
        --charcoal: #1a1a1a;
        --gold: #ffd200;
        --gold-deep: #c9a400;
        --bone: #f7f4ec;
        --steel-dim: rgba(247, 244, 236, 0.55);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: var(--ink);
      }
      body {
        font-family: "Fira Sans Condensed", sans-serif;
      }

      #root {
        position: relative;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: var(--ink);
      }

      /* ---------- photo scenes ---------- */
      .scene {
        position: absolute;
        inset: 0;
        background: var(--ink);
        overflow: hidden;
      }
      .kb-img {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 1080px;
        height: auto;
        display: block;
        will-change: transform;
      }
      .vignette {
        position: absolute;
        inset: -4%;
        pointer-events: none;
        background: radial-gradient(
          ellipse at 50% 46%,
          rgba(16, 16, 16, 0) 46%,
          rgba(16, 16, 16, 0.5) 82%,
          rgba(16, 16, 16, 0.82) 100%
        );
        z-index: 2;
      }

      /* ---------- persistent grain ---------- */
      #grain {
        position: absolute;
        inset: 0;
        z-index: 15;
        pointer-events: none;
        opacity: 0.05;
        mix-blend-mode: overlay;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
        background-size: 360px 360px;
      }

      /* ---------- IG-style progress bar ---------- */
      #progressbar {
        position: absolute;
        top: 64px;
        left: 32px;
        right: 32px;
        height: 6px;
        display: flex;
        gap: 8px;
        z-index: 20;
      }
      .seg-track {
        position: relative;
        flex: 1 1 0;
        height: 5px;
        border-radius: 3px;
        background: rgba(247, 244, 236, 0.28);
        overflow: hidden;
      }
      .seg-fill {
        position: absolute;
        inset: 0;
        background: var(--gold);
        transform: scaleX(0);
        transform-origin: left center;
        border-radius: 3px;
      }

      /* ---------- blade-flash accent transition ---------- */
      #blade-flash {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 2700px;
        height: 260px;
        background: linear-gradient(
          90deg,
          rgba(255, 210, 0, 0) 0%,
          rgba(255, 236, 150, 0.85) 46%,
          rgba(255, 246, 210, 1) 50%,
          rgba(255, 236, 150, 0.85) 54%,
          rgba(255, 210, 0, 0) 100%
        );
        opacity: 0;
        z-index: 30;
        pointer-events: none;
      }

      /* ---------- outro scene ---------- */
      #scene-outro {
        opacity: 0;
      }
      #scene-outro .content-wrap {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 140px 96px;
        text-align: center;
        gap: 28px;
      }
      #ghost-word {
        position: absolute;
        left: 50%;
        top: 30%;
        transform: translate(-50%, -50%);
        font-family: "Lost in South", sans-serif;
        text-transform: uppercase;
        font-size: 340px;
        line-height: 1;
        color: var(--bone);
        opacity: 0.05;
        white-space: nowrap;
        z-index: 0;
      }
      #outro-glow {
        position: absolute;
        left: 50%;
        top: 44%;
        width: 1400px;
        height: 1400px;
        background: radial-gradient(circle, rgba(255, 210, 0, 0.32) 0%, rgba(255, 210, 0, 0) 62%);
        z-index: 0;
        pointer-events: none;
      }
      .tick {
        position: absolute;
        width: 34px;
        height: 34px;
        z-index: 1;
      }
      .tick::before,
      .tick::after {
        content: "";
        position: absolute;
        background: var(--gold);
      }
      .tick::before {
        width: 100%;
        height: 2px;
        top: 50%;
        transform: translateY(-50%);
      }
      .tick::after {
        height: 100%;
        width: 2px;
        left: 50%;
        transform: translateX(-50%);
      }
      #tick-tl {
        top: 96px;
        left: 96px;
      }
      #tick-br {
        bottom: 96px;
        right: 96px;
      }
      #outro-eyebrow {
        position: relative;
        z-index: 2;
        display: inline-block;
        background: #ffd200;
        color: #101010;
        font-family: "Fira Sans Condensed", sans-serif;
        font-weight: 800;
        font-size: 22px;
        letter-spacing: 0.14em;

      #outro-headline {

      #outro-rule {

      #outro-signature {
        position: relative;

        font-family: "Lost in South", sans-serif;
        text-transform: none;
        font-size: 46px;
        line-height: 1.3;
        color: var(--gold);
      }
      #outro-logo {
        position: relative;
        z-index: 2;
        width: 260px;
        margin-top: 12px;
      }
      #outro-logo img {
        width: 100%;
        display: block;
      }
      #outro-handle {
        position: relative;
        z-index: 2;
        font-family: "Fira Sans Condensed", sans-serif;

      #outro-link {
        position: relative;

      }
      #outro-fade {
        position: absolute;
        inset: 0;
        background: var(--ink);
        opacity: 0;
        z-index: 40;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div data-hf-id="hf-fovc" id="root" data-composition-id="main" data-start="0" data-width="1080" data-height="1920" data-duration="17">

      <audio data-hf-id="hf-8n5o" id="sfx-blade-1" src="assets/sfx/blade-whoosh.mp3" data-start="2.2" data-duration="0.96" data-track-index="21" data-volume="0.35"></audio>
      <audio data-hf-id="hf-ylsf" id="sfx-blade-2" src="assets/sfx/blade-whoosh.mp3" data-start="13.5" data-duration="0.96" data-track-index="22" data-volume="0.35"></audio>

      <!-- persistent UI -->
      <div data-hf-id="hf-f6d6" id="grain"></div>
      <div data-hf-id="hf-ulwv" id="progressbar">
        <div data-hf-id="hf-q2td" class="seg-track"><div data-hf-id="hf-sbfb" class="seg-fill" id="seg-0"></div></div>
        <div data-hf-id="hf-336d" class="seg-track"><div data-hf-id="hf-kbc6" class="seg-fill" id="seg-1"></div></div>
        <div data-hf-id="hf-4a3g" class="seg-track"><div data-hf-id="hf-gd85" class="seg-fill" id="seg-2"></div></div>
        <div data-hf-id="hf-3vsf" class="seg-track"><div data-hf-id="hf-jnjg" class="seg-fill" id="seg-3"></div></div>
        <div data-hf-id="hf-52pi" class="seg-track"><div data-hf-id="hf-750z" class="seg-fill" id="seg-4"></div></div>
        <div data-hf-id="hf-4oeh" class="seg-track"><div data-hf-id="hf-z4xu" class="seg-fill" id="seg-5"></div></div>

      <div data-hf-id="hf-cn88" id="blade-flash"></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // blade-flash owns its own transform stack from here on: xPercent/yPercent center it,
      // rotation is fixed, x (px) is what the transition animates.
      tl.set("#blade-flash", { xPercent: -50, yPercent: -50, rotation: 18, x: -2400 }, 0);

      // ---- scene schedule ----
      // T_enter: moment each scene starts becoming current (its own incoming transition start)
      const T = { cover: 0, h1: 2.2, h2: 4.5, h3: 6.65, h4: 8.8, h5: 10.95, outro: 13.5 };
      // WINDOW[i] = full time this scene is "current" — from its own incoming transition
      // through to the next scene's incoming transition. Drives both ken-burns and the
      // progress-bar fill so camera motion never freezes before the cut.
      const segStarts = [T.cover, T.h1, T.h2, T.h3, T.h4, T.h5];
      const segEnds = [T.h1, T.h2, T.h3, T.h4, T.h5, T.outro];
      const WINDOW = {};
      ["cover", "h1", "h2", "h3", "h4", "h5"].forEach((k, i) => (WINDOW[k] = segEnds[i] - segStarts[i]));

      // ---- ken burns per photo scene (vary scale + drift direction/axis) ----
      // Every .kb-img tween carries xPercent:-50, yPercent:-50 itself (fromTo is exempt from
      // the css-transform/gsap conflict rule since both keyframes state it explicitly) — the
      // element has no CSS transform of its own, so GSAP owns centering + drift + zoom together.
      const CENTER = { xPercent: -50, yPercent: -50 };
      tl.fromTo("#scene-cover .kb-img", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.out" }, 0);
      tl.fromTo("#scene-cover .kb-img", { ...CENTER, scale: 1.0, x: 0, y: 0 }, { ...CENTER, scale: 1.05, duration: WINDOW.cover, ease: "none" }, T.cover);
      tl.fromTo("#scene-h1 .kb-img", { ...CENTER, scale: 1.0, x: 0, y: 0 }, { ...CENTER, scale: 1.07, x: -22, duration: WINDOW.h1, ease: "none" }, T.h1);
      tl.fromTo("#scene-h2 .kb-img", { ...CENTER, scale: 1.0, x: 0, y: 0 }, { ...CENTER, scale: 1.07, x: 22, duration: WINDOW.h2, ease: "none" }, T.h2);
      tl.fromTo("#scene-h3 .kb-img", { ...CENTER, scale: 1.0, x: 0, y: 0 }, { ...CENTER, scale: 1.06, y: -18, duration: WINDOW.h3, ease: "none" }, T.h3);
      tl.fromTo("#scene-h4 .kb-img", { ...CENTER, scale: 1.0, x: 0, y: 0 }, { ...CENTER, scale: 1.07, x: -20, duration: WINDOW.h4, ease: "none" }, T.h4);
      tl.fromTo("#scene-h5 .kb-img", { ...CENTER, scale: 1.0, x: 0, y: 0 }, { ...CENTER, scale: 1.035, duration: WINDOW.h5, ease: "none" }, T.h5);

      // ---- IG-style progress bar fills ----
      for (let i = 0; i < 6; i++) {
        tl.fromTo(`#seg-${i}`, { scaleX: 0 }, { scaleX: 1, duration: segEnds[i] - segStarts[i], ease: "none" }, segStarts[i]);
      }
      tl.to("#progressbar", { opacity: 0, duration: 0.35, ease: "power1.out" }, T.outro);

      // ---- diagonal split (primary transition, 4x, alternating corner) ----
      function diagonalSplit(oldSel, newSel, start, dur, corner) {
        // "to" polygons repeat one vertex to keep a 4-point count matching "from" — required
        // for clip-path to interpolate smoothly instead of jump-cutting mid-animation.
        const corners = {
          tr: { from: "polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%)", to: "polygon(60% 0%, 100% 0%, 100% 40%, 60% 0%)" },
          bl: { from: "polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%)", to: "polygon(0% 60%, 0% 100%, 40% 100%, 0% 60%)" },
          tl: { from: "polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%)", to: "polygon(0% 0%, 40% 0%, 0% 40%, 0% 0%)" },
          br: { from: "polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%)", to: "polygon(100% 60%, 100% 100%, 60% 100%, 100% 60%)" },
        };
        const c = corners[corner];
        tl.set(newSel, { opacity: 1, zIndex: 1 }, start);
        tl.set(oldSel, { zIndex: 10, clipPath: c.from }, start);
        tl.to(oldSel, { clipPath: c.to, duration: dur, ease: "power3.inOut" }, start);
        tl.set(oldSel, { opacity: 0, zIndex: "auto", clipPath: "none" }, start + dur);
        tl.set(newSel, { zIndex: "auto" }, start + dur);
      }
      diagonalSplit("#scene-h1", "#scene-h2", T.h2, 0.45, "tr");
      diagonalSplit("#scene-h2", "#scene-h3", T.h3, 0.45, "bl");
      diagonalSplit("#scene-h3", "#scene-h4", T.h4, 0.45, "tl");
      diagonalSplit("#scene-h4", "#scene-h5", T.h5, 0.45, "br");

      // ---- blade-flash (accent transition, bookends: cover→h1 and h5→outro) ----
      function bladeFlash(oldSel, newSel, start, dur) {
        tl.set(newSel, { opacity: 1, zIndex: 1 }, start);
        tl.set(oldSel, { zIndex: 10 }, start);
        tl.set("#blade-flash", { x: -2400 }, start);
        tl.to("#blade-flash", { x: 2400, duration: dur - 0.05, ease: "power2.inOut" }, start);
        tl.to("#blade-flash", { opacity: 1, duration: 0.15, ease: "power1.in" }, start);
        tl.to(oldSel, { filter: "brightness(1.6)", duration: 0.15, ease: "power1.in" }, start + 0.08);
        tl.set(oldSel, { opacity: 0, zIndex: "auto", filter: "brightness(1)" }, start + dur * 0.5);
        tl.set(newSel, { zIndex: "auto" }, start + dur * 0.5);
        tl.fromTo(newSel, { filter: "brightness(1.6)" }, { filter: "brightness(1)", duration: dur * 0.45, ease: "power2.out" }, start + dur * 0.5);
        tl.to("#blade-flash", { opacity: 0, duration: 0.2, ease: "power1.out" }, start + dur - 0.2);
      }
      bladeFlash("#scene-cover", "#scene-h1", T.h1, 0.6);
      bladeFlash("#scene-h5", "#scene-outro", T.outro, 0.6);

      // ---- outro entrances ----
      const O = T.outro + 0.35;
      tl.fromTo(
        "#outro-glow",
        { xPercent: -50, yPercent: -50, opacity: 0, scale: 0.8 },
        { xPercent: -50, yPercent: -50, opacity: 1, scale: 1, duration: 1.2, ease: "sine.out" },
        O,
      );
      tl.to("#outro-glow", { xPercent: -50, yPercent: -50, scale: 1.08, duration: 3, ease: "sine.inOut", yoyo: true, repeat: 1 }, O + 1.2);
      tl.fromTo("#ghost-word", { opacity: 0, letterSpacing: "0.02em" }, { opacity: 0.05, letterSpacing: "0em", duration: 1.4, ease: "power1.out" }, O);
      tl.fromTo(["#tick-tl", "#tick-br"], { opacity: 0 }, { opacity: 1, duration: 0.4, stagger: 0.1, ease: "power2.out" }, O + 0.1);
      tl.fromTo("#outro-eyebrow", { opacity: 0, y: 24, scale: 0.9 }, { opacity: 1, y: 0, scale: 1, duration: 0.45, ease: "back.out(2.2)" }, O + 0.15);
      tl.fromTo("#outro-headline", { opacity: 0, y: 46 }, { opacity: 1, y: 0, duration: 0.55, ease: "power3.out" }, O + 0.32);
      tl.fromTo("#outro-rule", { scaleX: 0 }, { scaleX: 1, duration: 0.5, ease: "power2.inOut" }, O + 0.7);
      tl.fromTo("#outro-signature", { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.5, ease: "sine.out" }, O + 0.85);
      tl.fromTo("#outro-logo", { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.5, ease: "sine.out" }, O + 1.05);
      tl.fromTo(["#outro-handle", "#outro-link"], { opacity: 0, y: 14 }, { opacity: 1, y: 0, duration: 0.45, stagger: 0.08, ease: "sine.out" }, O + 1.25);

      // ---- final fade to black (exception: last scene may exit) ----
      tl.to("#outro-fade", { opacity: 1, duration: 0.5, ease: "power2.in" }, 16.5);
      tl.to("#bgm", { volume: 0, duration: 0.5, ease: "power2.in" }, 16.5);

      window.__timelines["main"] = tl;
    </script>
  </body>
