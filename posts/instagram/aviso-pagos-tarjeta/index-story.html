<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>aviso-pagos-tarjeta-story</title>
<style>
  @font-face{
    font-family:"Lost in South";
    src:url("assets/fonts/Lost in South.otf") format("opentype");
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("assets/fonts/FiraSansCondensed-Regular.ttf") format("truetype");
    font-weight:400;
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("assets/fonts/FiraSansCondensed-Bold.ttf") format("truetype");
    font-weight:700;
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("assets/fonts/FiraSansCondensed-ExtraBold.ttf") format("truetype");
    font-weight:800;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1920px;background:#101010;overflow:hidden;}
  .canvas{
    position:relative;
    width:1080px;
    height:1920px;
    background:#101010;
  }
  .bg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center 35%;
  }
  .scrim-top{
    position:absolute;
    left:0; right:0; top:0;
    height:58%;
    background:linear-gradient(to bottom, rgba(16,16,16,.92) 0%, rgba(16,16,16,.65) 60%, rgba(16,16,16,0) 100%);
  }
  /* Instagram Story safe zones: keep content clear of the top ~250px
     (profile/close UI) and bottom ~220px (reply bar). Text lives in the
     empty upper half of the frame, where the AI photo left negative space. */
  .pill{
    position:absolute;
    top:260px; left:64px;
    background:#E5342A;
    color:#F7F4EC;
    font-family:"Fira Sans Condensed";
    font-weight:800;
    font-size:26px;
    letter-spacing:.06em;
    text-transform:uppercase;
    padding:14px 32px;
    border-radius:40px;
  }
  .headline{
    position:absolute;
    left:64px; right:64px;
    top:380px;
    font-family:"Lost in South";
    font-size:86px;
    letter-spacing:.07em;
    line-height:1.04;
    text-transform:uppercase;
    color:#F7F4EC;
  }
  .headline .hl{color:#E5342A;}
  .caption{
    position:absolute;
    left:64px; right:64px;
    top:650px;
    font-family:"Fira Sans Condensed";
    font-weight:400;
    font-size:36px;
    line-height:1.4;
    color:#F7F4EC;
    opacity:.85;
  }
  .deposit-box{
    position:absolute;
    left:64px; right:64px;
    top:840px;
    border:1px solid #C9A400;
    border-radius:16px;
    background:rgba(16,16,16,.6);
    padding:40px 44px;
  }
  .deposit-eyebrow{
    font-family:"Fira Sans Condensed";
    font-weight:800;
    font-size:26px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:#FFD200;
    margin-bottom:18px;
  }
  .deposit-bank{
    font-family:"Fira Sans Condensed";
    font-weight:700;
    font-size:36px;
    color:#F7F4EC;
    margin-bottom:8px;
  }
  .deposit-number{
    font-family:"Fira Sans Condensed";
    font-weight:800;
    font-size:64px;
    letter-spacing:.02em;
    color:#FFD200;
    margin-bottom:12px;
  }
  .deposit-holder{
    font-family:"Fira Sans Condensed";
    font-weight:400;
    font-size:30px;
    color:#F7F4EC;
    opacity:.8;
  }
  .logo{
    position:absolute;
    right:64px;
    bottom:220px;
    height:100px;
  }
</style>
</head>
<body>
  <div class="canvas">
    <img class="bg" src="assets/bg.png">
    <div class="scrim-top"></div>
    <div class="pill">Aviso importante</div>
    <div class="headline">Temporalmente <span class="hl">sin</span> pagos con tarjeta</div>
    <div class="caption">Estamos presentando fallas para procesar pagos con tarjeta de crédito/débito. Disculpá el inconveniente, no depende de nosotros.</div>
    <div class="deposit-box">
      <div class="deposit-eyebrow">Depositá directo a nuestra cuenta</div>
      <div class="deposit-bank">Banco Industrial — Cuenta Monetaria</div>
      <div class="deposit-number">3250223785</div>
      <div class="deposit-holder">A nombre de: Nordic Corporation</div>
    </div>
    <img class="logo" src="assets/Nordic-BarberShop-logo-white.svg">
  </div>
</body>
</html>
