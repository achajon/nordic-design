<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>aviso-pagos-tarjeta</title>
<style>
  @font-face{
    font-family:"Lost in South";
    src:url("assets/fonts/Lost in South.otf") format("opentype");
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("assets/fonts/FiraSansCondensed-Regular.ttf") format("truetype");
    font-weight:400;
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("assets/fonts/FiraSansCondensed-Bold.ttf") format("truetype");
    font-weight:700;
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("assets/fonts/FiraSansCondensed-ExtraBold.ttf") format("truetype");
    font-weight:800;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1350px;background:#101010;overflow:hidden;}
  .canvas{
    position:relative;
    width:1080px;
    height:1350px;
    background:#101010;
  }
  .bg-wrap{
    position:absolute;
    inset:0;
    overflow:hidden;
  }
  .bg{
    position:absolute;
    top:-90px;
    left:0;
    width:1080px;
    height:auto;
  }
  .scrim{
    position:absolute;
    left:0; right:0; top:0;
    height:64%;
    background:linear-gradient(to bottom, rgba(16,16,16,.88) 0%, rgba(16,16,16,.62) 55%, rgba(16,16,16,0) 100%);
  }
  .pill{
    position:absolute;
    top:64px; left:64px;
    background:#E5342A;
    color:#F7F4EC;
    font-family:"Fira Sans Condensed";
    font-weight:800;
    font-size:26px;
    letter-spacing:.06em;
    text-transform:uppercase;
    padding:14px 32px;
    border-radius:40px;
  }
  .headline{
    position:absolute;
    left:64px; right:64px;
    top:150px;
    font-family:"Lost in South";
    font-size:72px;
    letter-spacing:.07em;
    line-height:1.04;
    text-transform:uppercase;
    color:#F7F4EC;
  }
  .headline .hl{color:#E5342A;}
  .caption{
    position:absolute;
    left:64px; right:64px;
    top:420px;
    font-family:"Fira Sans Condensed";
    font-weight:400;
    font-size:30px;
    line-height:1.4;
    color:#F7F4EC;
    opacity:.85;
  }
  .deposit-box{
    position:absolute;
    left:64px; right:64px;
    top:560px;
    border:1px solid #C9A400;
    border-radius:14px;
    background:rgba(16,16,16,.55);
    padding:32px 36px;
  }
  .deposit-eyebrow{
    font-family:"Fira Sans Condensed";
    font-weight:800;
    font-size:22px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:#FFD200;
    margin-bottom:14px;
  }
  .deposit-bank{
    font-family:"Fira Sans Condensed";
    font-weight:700;
    font-size:30px;
    color:#F7F4EC;
    margin-bottom:6px;
  }
  .deposit-number{
    font-family:"Fira Sans Condensed";
    font-weight:800;
    font-size:52px;
    letter-spacing:.02em;
    color:#FFD200;
    margin-bottom:10px;
  }
  .deposit-holder{
    font-family:"Fira Sans Condensed";
    font-weight:400;
    font-size:26px;
    color:#F7F4EC;
    opacity:.8;
  }
  .logo{
    position:absolute;
    right:64px;
    bottom:56px;
    height:60px;
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="bg-wrap"><img class="bg" src="assets/bg.png"></div>
    <div class="scrim"></div>
    <div class="pill">Aviso importante</div>
    <div class="headline">Temporalmente <span class="hl">sin</span> pagos con tarjeta</div>
    <div class="caption">Estamos presentando fallas para procesar pagos con tarjeta de crédito/débito. Disculpá el inconveniente, no depende de nosotros.</div>
    <div class="deposit-box">
      <div class="deposit-eyebrow">Depositá directo a nuestra cuenta</div>
      <div class="deposit-bank">Banco Industrial — Cuenta Monetaria</div>
      <div class="deposit-number">3250223785</div>
      <div class="deposit-holder">A nombre de: Nordic Corporation</div>
    </div>
    <img class="logo" src="assets/Nordic-BarberShop-logo-white.svg">
  </div>
</body>
</html>
