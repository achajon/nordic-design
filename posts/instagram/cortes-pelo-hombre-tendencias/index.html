<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cortes de pelo hombre — tile render</title>
<style>
  @font-face{
    font-family:"Lost in South";
    src:url("assets/fonts/Lost in South.otf") format("opentype");
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("assets/fonts/FiraSansCondensed-Regular.ttf") format("truetype");
    font-weight:400;
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("assets/fonts/FiraSansCondensed-Bold.ttf") format("truetype");
    font-weight:700;
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("assets/fonts/FiraSansCondensed-ExtraBold.ttf") format("truetype");
    font-weight:800;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1350px;background:#101010;overflow:hidden;}
  .canvas{
    position:relative;
    width:1080px;
    height:1350px;
    background:#101010;
  }
  .bg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
  }
  .scrim{
    position:absolute;
    left:0; right:0; bottom:0;
    height:62%;
    background:linear-gradient(to bottom, rgba(16,16,16,0) 0%, rgba(16,16,16,.5) 32%, rgba(16,16,16,.9) 70%, rgba(16,16,16,1) 100%);
  }
  .pill{
    position:absolute;
    top:64px; left:64px;
    background:#FFD200;
    color:#101010;
    font-family:"Fira Sans Condensed";
    font-weight:800;
    font-size:26px;
    letter-spacing:.06em;
    text-transform:uppercase;
    padding:14px 32px;
    border-radius:40px;
    white-space:nowrap;
  }
  .headline{
    position:absolute;
    left:64px; right:64px;
    bottom:345px;
    font-family:"Lost in South";
    font-size:100px;
    line-height:0.98;
    letter-spacing:.07em;
    text-transform:uppercase;
    color:#F7F4EC;
  }
  .headline .hl{color:#FFD200;}
  .caption{
    position:absolute;
    left:64px; right:64px;
    bottom:180px;
    font-family:"Fira Sans Condensed";
    font-weight:400;
    font-size:35px;
    line-height:1.4;
    color:#F7F4EC;
    opacity:.85;
  }
  .logo{
    position:absolute;
    right:64px;
    bottom:56px;
    height:100px;
  }
</style>
</head>
<body>
  <div class="canvas">
    <img class="bg" id="bg">
    <div class="scrim"></div>
    <div class="pill" id="pill"></div>
    <div class="headline" id="headline"></div>
    <div class="caption" id="caption"></div>
    <img class="logo" src="assets/Nordic-BarberShop-logo-white.svg">
  </div>

<script>
  const slides = [
    { bg:"assets/bg-00-portada-v2.png", pill:"Tendencias 2026", headline:"Siete cortes que si funcionan", highlight:"funcionan", caption:"Del skin fade al mullet: los cortes de hombre que vas a ver este año. Desliza y elige el tuyo." },
    { bg:"assets/bg-01-skin-fade.png", pill:"01/07 · Skin fade", headline:"Corto hasta la piel", highlight:"piel", caption:"Buzz cut arriba, degradado total atrás y en los lados hasta fundirse con la piel. El fade más limpio que existe." },
    { bg:"assets/bg-02-taper-fade.png", pill:"02/07 · Taper fade", headline:"Precision en la nuca", highlight:"precision", caption:"El degradado se concentra en la nuca y alrededor de las orejas, dejando el resto del corte casi intacto. La versión más sutil del fade." },
    { bg:"assets/bg-03-drop-fade.png", pill:"03/07 · Drop fade", headline:"El fade que cae en curva", highlight:"curva", caption:"Arranca arriba de la cabeza y desciende en curva hacia la nuca, marcando la forma del cráneo con el degradado." },
    { bg:"assets/bg-04-burst-fade.png", pill:"04/07 · Burst fade", headline:"Corte con movimiento", highlight:"movimiento", caption:"Un corte semicircular alrededor de la oreja crea un efecto dinámico, ideal para combinar con top texturizado o flequillo." },
    { bg:"assets/bg-05-french-crop.png", pill:"05/07 · French crop", headline:"Textura arriba, estilo francés", highlight:"textura", caption:"Top texturizado con flequillo peinado hacia adelante. Se adapta a cualquier tipo de pelo y nivel de fade en los lados." },
    { bg:"assets/bg-06-buzz-cut-v2.png", pill:"06/07 · Buzz cut", headline:"Corto, parejo, sin vuelta", highlight:"parejo", caption:"Entre 1 y 4 mm de largo en toda la cabeza. El corte de menor mantenimiento que existe, listo en minutos." },
    { bg:"assets/bg-07-mullet.png", pill:"07/07 · Mullet", headline:"Corto adelante, largo atrás", highlight:"largo", caption:"Contraste puro: lados y frente cortos, nuca larga. El corte retro que volvió con fuerza este año." },
    { bg:"assets/bg-08-cita.png", pill:"Agenda tu cita", headline:"Tu fade, tallado a mano", highlight:"tallado", caption:"Nuestros barberos afinan cada línea a mano. Agenda tu cita en Nordic Barber Shop y elige tu corte." }
  ];

  function highlightHeadline(headline, highlight){
    if(!highlight) return headline;
    const re = new RegExp(`(${highlight})`, "i");
    return headline.replace(re, `<span class="hl">$1</span>`);
  }

  const params = new URLSearchParams(location.search);
  const i = parseInt(params.get("slide") || "0", 10);
  const s = slides[i];

  document.getElementById("bg").src = s.bg;
  document.getElementById("pill").textContent = s.pill;
  document.getElementById("headline").innerHTML = highlightHeadline(s.headline, s.highlight);
  document.getElementById("caption").textContent = s.caption;
</script>
</body>
</html>
