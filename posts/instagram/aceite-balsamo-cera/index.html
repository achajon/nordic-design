<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Aceite, balsamo o cera — tile render</title>
<style>
  @font-face{
    font-family:"Lost in South";
    src:url("assets/fonts/Lost in South.otf") format("opentype");
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("assets/fonts/FiraSansCondensed-Regular.ttf") format("truetype");
    font-weight:400;
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("assets/fonts/FiraSansCondensed-Bold.ttf") format("truetype");
    font-weight:700;
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("assets/fonts/FiraSansCondensed-ExtraBold.ttf") format("truetype");
    font-weight:800;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1350px;background:#101010;overflow:hidden;}
  .canvas{
    position:relative;
    width:1080px;
    height:1350px;
    background:#101010;
  }
  .bg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
  }
  .scrim{
    position:absolute;
    left:0; right:0; bottom:0;
    height:62%;
    background:linear-gradient(to bottom, rgba(16,16,16,0) 0%, rgba(16,16,16,.5) 32%, rgba(16,16,16,.9) 70%, rgba(16,16,16,1) 100%);
  }
  .pill{
    position:absolute;
    top:64px; left:64px;
    background:#FFD200;
    color:#101010;
    font-family:"Fira Sans Condensed";
    font-weight:800;
    font-size:26px;
    letter-spacing:.06em;
    text-transform:uppercase;
    padding:14px 32px;
    border-radius:40px;
    white-space:nowrap;
  }
  .headline{
    position:absolute;
    left:64px; right:64px;
    bottom:230px;
    font-family:"Lost in South";
    font-size:88px;
    line-height:0.98;
    text-transform:uppercase;
    color:#F7F4EC;
  }
  .headline .hl{color:#FFD200;}
  .caption{
    position:absolute;
    left:64px; right:64px;
    bottom:110px;
    font-family:"Fira Sans Condensed";
    font-weight:400;
    font-size:31px;
    line-height:1.4;
    color:#F7F4EC;
    opacity:.85;
  }
  .logo{
    position:absolute;
    right:64px;
    bottom:56px;
    height:83px;
  }
</style>
</head>
<body>
  <div class="canvas">
    <img class="bg" id="bg">
    <div class="scrim"></div>
    <div class="pill" id="pill"></div>
    <div class="headline" id="headline"></div>
    <div class="caption" id="caption"></div>
    <img class="logo" src="assets/Nordic-BarberShop-logo-white.svg">
  </div>

<script>
  const slides = [
    { bg:"assets/bg-00-portada.png", pill:"Guia de barba", headline:"El producto que le falta a tu barba", highlight:"falta", caption:"Aceite, balsamo o cera: cada barba pide algo distinto. Desliza y descubre cual es la tuya." },
    { bg:"assets/bg-01-aceite.png", pill:"01/03 · Aceite", headline:"Aceite: hidratacion diaria", highlight:"hidratacion", caption:"Para cualquier largo, desde sombra de barba hasta barba larga. Ablanda el pelo, calma la piel y nutre el foliculo. Unas gotas cada manana." },
    { bg:"assets/bg-02-balsamo.png", pill:"02/03 · Balsamo", headline:"Balsamo: estilo con cuerpo", highlight:"estilo", caption:"Desde 1 cm de largo. Hidrata, da fijacion ligera y hace ver la barba mas densa. Raspa con la una, frota entre las palmas y peina." },
    { bg:"assets/bg-03-cera.png", pill:"03/03 · Cera", headline:"Cera: sujecion total", highlight:"total", caption:"Para barbas gruesas o rebeldes de mas de 1 cm. Fijacion firme todo el dia, se retira facil en la ducha." },
    { bg:"assets/bg-04-cual-elegir.png", pill:"¿Cual es la tuya?", headline:"Tres barbas, tres soluciones", highlight:"soluciones", caption:"Sombra o corta: aceite. Con estilo desde 1 cm: balsamo. Gruesa o rebelde: cera." },
    { bg:"assets/bg-05-cita.png", pill:"Agenda tu cita", headline:"Tallado y consejo experto", highlight:"experto", caption:"Nuestros barberos te dicen que producto le toca a tu barba. Agenda tu tallado en Nordic Barber Shop." }
  ];

  function highlightHeadline(headline, highlight){
    if(!highlight) return headline;
    const re = new RegExp(`(${highlight})`, "i");
    return headline.replace(re, `<span class="hl">$1</span>`);
  }

  const params = new URLSearchParams(location.search);
  const i = parseInt(params.get("slide") || "0", 10);
  const s = slides[i];

  document.getElementById("bg").src = s.bg;
  document.getElementById("pill").textContent = s.pill;
  document.getElementById("headline").innerHTML = highlightHeadline(s.headline, s.highlight);
  document.getElementById("caption").textContent = s.caption;
</script>
</body>
</html>
