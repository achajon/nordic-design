<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>cambio-numero-whatsapp-story</title>
<style>
  @font-face{
    font-family:"Lost in South";
    src:url("assets/fonts/Lost in South.otf") format("opentype");
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("assets/fonts/FiraSansCondensed-Regular.ttf") format("truetype");
    font-weight:400;
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("assets/fonts/FiraSansCondensed-Bold.ttf") format("truetype");
    font-weight:700;
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("assets/fonts/FiraSansCondensed-ExtraBold.ttf") format("truetype");
    font-weight:800;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1920px;background:#101010;overflow:hidden;}
  .canvas{
    position:relative;
    width:1080px;
    height:1920px;
    background:#101010;
  }
  .bg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center 25%;
  }
  .scrim{
    position:absolute;
    left:0; right:0; bottom:0;
    height:20%;
    background:linear-gradient(to bottom, rgba(16,16,16,0) 0%, rgba(16,16,16,.7) 55%, rgba(16,16,16,.95) 100%);
  }
  .scrim-top{
    position:absolute;
    left:0; right:0; top:0;
    height:50%;
    background:linear-gradient(to bottom, rgba(16,16,16,.92) 0%, rgba(16,16,16,.65) 60%, rgba(16,16,16,0) 100%);
  }
  /* Instagram Story safe zones: keep content clear of the top ~250px
     (profile/close UI) and bottom ~220px (reply bar). Text lives in the
     empty upper half of the frame, where the AI photo left negative space. */
  .pill{
    position:absolute;
    top:260px; left:64px;
    background:#FFD200;
    color:#101010;
    font-family:"Fira Sans Condensed";
    font-weight:800;
    font-size:26px;
    letter-spacing:.06em;
    text-transform:uppercase;
    padding:14px 32px;
    border-radius:40px;
  }
  .headline{
    position:absolute;
    left:64px; right:64px;
    top:380px;
    font-family:"Lost in South";
    font-size:116px;
    letter-spacing:.07em;
    line-height:1.05;
    text-transform:uppercase;
    color:#F7F4EC;
  }
  .headline .hl{color:#FFD200;}
  .caption{
    position:absolute;
    left:64px; right:64px;
    top:730px;
    font-family:"Fira Sans Condensed";
    font-weight:400;
    font-size:42px;
    line-height:1.4;
    color:#F7F4EC;
    opacity:.9;
  }
  .logo{
    position:absolute;
    right:64px;
    bottom:220px;
    height:110px;
  }
</style>
</head>
<body>
  <div class="canvas">
    <img class="bg" src="assets/bg-v1-story.png">
    <div class="scrim-top"></div>
    <div class="scrim"></div>
    <div class="pill">Cambio de número</div>
    <div class="headline">Tenemos whatsapp <span class="hl">nuevo</span></div>
    <div class="caption">Agenda tu cita al 2260-9101</div>
    <img class="logo" src="assets/Nordic-BarberShop-logo-white.svg">
  </div>
</body>
</html>
