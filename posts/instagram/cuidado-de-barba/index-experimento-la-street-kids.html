<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>cuidado-de-barba (experimento: LA Street Kids)</title>
<style>
  @font-face{
    font-family:"LA Street Kids";
    src:url("assets/fonts/LAStreetKids.ttf") format("truetype");
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("assets/fonts/FiraSansCondensed-Regular.ttf") format("truetype");
    font-weight:400;
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("assets/fonts/FiraSansCondensed-Bold.ttf") format("truetype");
    font-weight:700;
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("assets/fonts/FiraSansCondensed-BoldItalic.ttf") format("truetype");
    font-weight:700;
    font-style:italic;
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("assets/fonts/FiraSansCondensed-ExtraBold.ttf") format("truetype");
    font-weight:800;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1350px;background:#101010;overflow:hidden;}
  .canvas{
    position:relative;
    width:1080px;
    height:1350px;
    background:#101010;
    overflow:hidden;
  }

  /* ---- right photo panel ---- */
  .photo-wrap{
    position:absolute;
    top:0; right:0;
    width:620px;
    height:1350px;
    overflow:hidden;
    background:#0a0a0a;
  }
  .photo-wrap img{
    position:absolute;
    top:50%; left:50%;
    height:1350px;
    width:auto;
    transform:translate(-50%,-50%);
  }
  .photo-scrim{
    position:absolute;
    inset:0;
    background:linear-gradient(to right, rgba(16,16,16,1) 0%, rgba(16,16,16,0) 22%);
  }

  /* ---- left yellow panel ---- */
  .yellow-panel{
    position:absolute;
    top:0; left:0;
    width:640px;
    height:1350px;
    background:#FFD200;
  }

  /* ---- angular blade-cut accents ---- */
  .blade{
    position:absolute;
    background:#101010;
  }
  .blade-1{
    /* seam-side diagonal cut, top */
    top:0; left:560px;
    width:180px; height:1350px;
    clip-path:polygon(100% 0, 100% 100%, 0 100%, 60% 0);
  }
  .blade-2{
    /* small corner cut, top-left */
    top:0; left:0;
    width:130px; height:70px;
    clip-path:polygon(0 0, 100% 0, 0 100%);
  }
  .blade-3{
    /* small accent cut, bottom-left of yellow panel */
    bottom:0; left:0;
    width:230px; height:46px;
    clip-path:polygon(0 100%, 0 0, 100% 100%);
    background:#FFD200;
  }
  .blade-4{
    bottom:0; left:0;
    width:340px; height:120px;
    clip-path:polygon(0 100%, 0 40%, 100% 100%);
  }

  /* ---- pill ---- */
  .pill{
    position:absolute;
    top:70px; left:64px;
    background:#101010;
    color:#F7F4EC;
    font-family:"Fira Sans Condensed";
    font-weight:800;
    font-size:24px;
    letter-spacing:.1em;
    text-transform:uppercase;
    padding:13px 28px;
    clip-path:polygon(0 0, 100% 0, 96% 100%, 0% 100%);
  }

  /* ---- headline ---- */
  .headline-wrap{
    position:absolute;
    left:64px; right:120px;
    top:230px;
  }
  .headline{
    font-family:"LA Street Kids";
    font-size:96px;
    letter-spacing:.07em;
    line-height:0.94;
    color:#101010;
  }
  .ghost{
    position:relative;
    margin-top:-6px;
    font-family:"LA Street Kids";
    font-size:132px;
    letter-spacing:.07em;
    line-height:0.9;
    text-transform:uppercase;
    color:#101010;
    opacity:.14;
    white-space:nowrap;
  }

  /* ---- ribbon banner ---- */
  .ribbon{
    position:absolute;
    left:0; top:900px;
    width:600px;
    background:#101010;
    clip-path:polygon(0 0, 100% 12%, 96% 100%, 0% 88%);
    padding:30px 60px 30px 64px;
  }
  .ribbon span{
    display:block;
    font-family:"Fira Sans Condensed";
    font-weight:700;
    font-style:italic;
    font-size:32px;
    letter-spacing:.03em;
    text-transform:uppercase;
    color:#F7F4EC;
    line-height:1.25;
  }

  /* ---- logo ---- */
  .logo{
    position:absolute;
    right:56px;
    bottom:56px;
    height:64px;
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="photo-wrap">
      <img src="assets/bg.png">
      <div class="photo-scrim"></div>
    </div>

    <div class="yellow-panel"></div>
    <div class="blade blade-1"></div>
    <div class="blade blade-2"></div>
    <div class="blade blade-3"></div>
    <div class="blade blade-4"></div>

    <div class="pill">Cuidado de barba</div>

    <div class="headline-wrap">
      <div class="headline">Como cuidar</div>
      <div class="headline">Tu Barba</div>
      <div class="ghost">Barba</div>
    </div>

    <div class="ribbon"><span>Mirá los tips<br>en la legenda</span></div>

    <img class="logo" src="assets/Nordic-BarberShop-logo-white.svg">
  </div>
</body>
</html>
