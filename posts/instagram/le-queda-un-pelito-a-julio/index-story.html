<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>le-queda-un-pelito-a-julio-story</title>
<style>
  @font-face{
    font-family:"Lost in South";
    src:url("assets/fonts/Lost in South.otf") format("opentype");
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("assets/fonts/FiraSansCondensed-Regular.ttf") format("truetype");
    font-weight:400;
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("assets/fonts/FiraSansCondensed-Bold.ttf") format("truetype");
    font-weight:700;
  }
  @font-face{
    font-family:"Fira Sans Condensed";
    src:url("assets/fonts/FiraSansCondensed-ExtraBold.ttf") format("truetype");
    font-weight:800;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1920px;background:#101010;overflow:hidden;}
  .canvas{
    position:relative;
    width:1080px;
    height:1920px;
    background:#101010;
  }
  .bg{
    position:absolute;
    top:530px;
    left:0;
    width:100%;
    height:auto;
    -webkit-mask-image:linear-gradient(to bottom, transparent 0%, black 10%, black 88%, transparent 100%);
    mask-image:linear-gradient(to bottom, transparent 0%, black 10%, black 88%, transparent 100%);
  }
  /* Instagram Story safe zones: keep content clear of the top ~250px
     (profile/close UI) and bottom ~220px (reply bar). Pill/headline/caption
     live in the dark headroom above the curl; logo sits on the dark suit
     lower in the frame, clear of the chin. */
  .pill{
    position:absolute;
    top:260px; left:64px;
    background:#FFD200;
    color:#101010;
    font-family:"Fira Sans Condensed";
    font-weight:800;
    font-size:28px;
    letter-spacing:.06em;
    text-transform:uppercase;
    padding:14px 32px;
    border-radius:40px;
  }
  .headline{
    position:absolute;
    left:64px; right:64px;
    top:380px;
    font-family:"Lost in South";
    font-size:84px;
    letter-spacing:.07em;
    line-height:1.02;
    text-transform:uppercase;
    color:#F7F4EC;
  }
  .headline .hl{color:#FFD200;}
  .caption{
    position:absolute;
    left:64px; right:64px;
    top:600px;
    font-family:"Fira Sans Condensed";
    font-weight:400;
    font-size:34px;
    line-height:1.4;
    color:#F7F4EC;
    opacity:.9;
  }
  .logo{
    position:absolute;
    right:64px;
    bottom:240px;
    height:90px;
  }
</style>
</head>
<body>
  <div class="canvas">
    <img class="bg" src="assets/bg.png">
    <div class="pill">Humor de barber&iacute;a</div>
    <div class="headline">Le queda un <span class="hl">pelito</span><br>a Julio</div>
    <div class="caption">Agenda tu cita.</div>
    <img class="logo" src="assets/Nordic-BarberShop-logo-white.svg">
  </div>
</body>
</html>
